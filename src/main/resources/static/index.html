<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Controle Financeiro</h1>

    <div id="mensagem">
        <p></p>
    </div>

    <div>
        <div id="modo-editando"></div>
        <input type="text" id="descricao" placeholder="Descrição" required>
        <input type="number" id="valor" min="0.01" step="0.01" placeholder="Valor" required>
        <select id="tipo">
            <option value="RECEITA">Receita</option>
            <option value="DESPESA">Despesa</option>
        </select>
        <div id="btn-salvar">
            <button class="btnSalvar" onclick="salvar()">Salvar</button>
        </div>
        <div id="btn-atualizar">
            <button class="btnAtualizar" onclick="salvar()">Atualizar</button>
            <button class="btnCancelar" onclick="cancelaAtualizacao()">Cancelar</button>
        </div>
        <p></p>
    </div>


    <div class="dashboard">
        <div class="card saldo">
            <h3>Saldo</h3>
            <p id="saldo">R$ 0,00</p>
        </div>

        <div class="card receita">
            <h3>Receita</h3>
            <p id="receitas">R$ 0,00</p>
        </div>

        <div class="card despesa">
            <h3>Despesa</h3>
            <p id="despesas">R$ 0,00</p>
        </div>
    </div>

    <div class="dashboard">

        <canvas id="graficoFinanceiro"></canvas>

    </div>

    <div>
        <input type="text" id="pesquisa" placeholder="Pesquisar movimentação..." oninput="aplicarFiltros()">

        <div class="filtros">
            <button id="btnTodos"
                    class="btnFiltro ativo"
                    onclick="selecionarFiltro('TODOS')">
                Todos
            </button>
            <button id="btnReceita"
                    class="btnFiltro ativo"
                    onclick="selecionarFiltro('RECEITA')">
                Receitas
            </button>
            <button id="btnDespesa"
                    class="btnFiltro ativo"
                    onclick="selecionarFiltro('DESPESA')">
                Despesas
            </button>
            <p></p>
        </div>

        <select id="ordenacao" onchange="aplicarFiltros()">
            <option value="DESCRICAO_ASC">
                Descrição (A-Z)
            </option>

            <option value="DESCRICAO_DESC">
                Descrição (Z-A)
            </option>

            <option value="VALOR_ASC">
                Valor (Menor > Maior)
            </option>

            <option value="VALOR_DESC">
                Valor (Maior < Menor)
            </option>
        </select>

    </div>
    <div id="mensagemTabela">
        <table>
            <thead>
            <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Tipo</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody id="tabelaMovimentacoes"></tbody>
        </table>

    </div>
</div>

<div id="modalExcluir" class="modal">
    <div class="modal-conteudo">
        <h2>Confirma a exclusão</h2>
        <p>Deseja excluir a movimentação abaixo?</p>
        <div id="modalDescricao"></div>
        <div class="modal-botoes">
            <button class="btnCancelar" onclick="fecharModal()"> Cancelar</button>
            <button class="btnExcluir" onclick="confirmaExclusao()"> Excluir</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
