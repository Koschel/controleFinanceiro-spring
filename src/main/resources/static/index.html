<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Controle Financeiro</h1>

    <div id="mensagem">
        <p></p>
    </div>

    <div>
        <input type="text" id="descricao" required>
        <input type="number" id="valor" min="0.01" step="0.01" required>
        <select id="tipo">
            <option value="RECEITA">Receita</option>
            <option value="DESPESA">Despesa</option>
        </select>
        <button onclick="salvar()">Salvar</button>
        <p> </p>
    </div>


    <div class="dashboard">
        <div class="card saldo">
            <h3>Saldo</h3>
            <p id="saldo">R$ 0,00</p>
        </div>

        <div class="card receita">
            <h3>Receita</h3>
            <p id="receitas">R$ 0,00</p>
        </div>

        <div class="card despesa">
            <h3>Despesa</h3>
            <p id="despesas">R$ 0,00</p>
        </div>
    </div>

    <div>
        <table>
            <thead>
            <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Tipo</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody id="tabelaMovimentacoes"></tbody>
        </table>

    </div>
</div>


<script src="script.js"></script>

</body>
</html>
